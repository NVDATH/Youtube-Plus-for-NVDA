summary = "YoutubePlus"
description = """YoutubePlus เป็นส่วนเสริมสำหรับผู้ที่ชื่นชอบ YouTube แต่พบว่าคุณลักษณะทางเว็บมากมายเข้าถึงได้ยาก เช่น การอ่านความคิดเห็นของวิดีโอ
เรานำคุณสมบัติเหล่านี้มาสู่คุณผ่านอินเทอร์เฟซผู้ใช้ NVDA ในรูปแบบที่เข้าถึงได้ ใช้ทางลัด และรูปแบบที่ปรับแต่งได้
ผู้ใช้ไม่จำเป็นต้องจัดการกับคีย์ API หรือเชื่อมโยงข้อมูลส่วนบุคคลใดๆ กับส่วนเสริม

คุณสมบัติ: 
• คุณสามารถติดตามช่องโปรดของคุณและมั่นใจได้ว่าคุณจะเห็นทุกวิดีโอที่พวกเขาโพสต์โดยไม่ถูกกรองออกโดยอัลกอริทึมของ YouTube
• เรานำเสนอระบบรายการโปรดสำหรับวิดีโอ ช่อง เพลย์ลิสต์ และรายการเฝ้าดูสำหรับบันทึกวิดีโอที่คุณสนใจแต่ยังไม่มีเวลาดู
• ระบบค้นหาในตัวที่แสดงผลลัพธ์ภายใน UI ที่สามารถเข้าถึงได้เช่นเดียวกับคุณลักษณะอื่นๆ แทนที่จะจัดให้มีช่องค้นหาที่เปิดผลลัพธ์บนเว็บ
• รวมคุณสมบัติการดาวน์โหลดสำหรับการบันทึกวิดีโอหรือไฟล์เสียง"""
